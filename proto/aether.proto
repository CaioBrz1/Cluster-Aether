syntax = "proto3";

package aether;

service WorkerService {
  rpc ExecuteTask (TaskRequest) returns (stream TaskResponse);
}

service MasterService {
  rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc InjectTask (TaskRequest) returns (TaskResponse);
}

message TaskRequest {
  string task_id = 1;
  string command = 2;
  bytes payload = 3;
}

message TaskResponse {
  string task_id = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
}

message HeartbeatRequest {
  string worker_id = 1;
  float cpu_usage = 2;
  float ram_usage = 3;
  float temperature = 4;
  uint32 worker_port = 5;
}

message HeartbeatResponse {
  bool acknowledged = 1;
}
